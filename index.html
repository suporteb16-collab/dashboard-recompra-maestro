<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jornada do Comprador · Maestro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  /* ── Reset & Base ─────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0f14;
    --surface:   #151820;
    --surface2:  #1c2030;
    --border:    #252a3a;
    --accent:    #6c63ff;
    --accent2:   #a78bfa;
    --green:     #22d3a5;
    --yellow:    #fbbf24;
    --red:       #f87171;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --radius:    12px;
    --shadow:    0 4px 24px rgba(0,0,0,.4);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    padding-bottom: 48px;
  }

  /* ── Header ──────────────────────────────────────────────── */
  header {
    background: linear-gradient(135deg, #0d0f14 0%, #151c30 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .header-inner {
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 16px; color: #fff;
    flex-shrink: 0;
  }

  .logo-text { line-height: 1.2; }
  .logo-title { font-size: 15px; font-weight: 700; color: var(--text); }
  .logo-sub   { font-size: 11px; color: var(--muted); }

  #last-update {
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 20px;
  }

  /* ── Main layout ─────────────────────────────────────────── */
  main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 24px 16px 0;
  }

  /* ── Filters ─────────────────────────────────────────────── */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 24px;
    padding: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  .filter-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
    min-width: 140px;
  }

  .filter-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .06em;
  }

  .filter-group select,
  .filter-group input[type="date"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 13px;
    width: 100%;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
  }

  .filter-group select:focus,
  .filter-group input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .btn-reset {
    align-self: flex-end;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

  /* ── KPI Cards ───────────────────────────────────────────── */
  .section-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: 12px;
  }

  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    position: relative;
    overflow: hidden;
    transition: border-color .2s;
  }
  .kpi-card:hover { border-color: var(--accent); }

  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--kpi-color, var(--accent));
  }

  .kpi-label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .kpi-value {
    font-size: 26px;
    font-weight: 800;
    color: var(--kpi-color, var(--text));
    line-height: 1;
  }

  .kpi-sub {
    font-size: 10px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* ── Charts grid ─────────────────────────────────────────── */
  .charts-grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .chart-card.col-8  { grid-column: span 8; }
  .chart-card.col-4  { grid-column: span 4; }
  .chart-card.col-6  { grid-column: span 6; }
  .chart-card.col-12 { grid-column: span 12; }

  .chart-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }
  .chart-sub {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .chart-wrap {
    position: relative;
    width: 100%;
  }

  /* ── Horizontal bar (produto) ─────────────────────────────── */
  .hbar-list { display: flex; flex-direction: column; gap: 10px; }

  .hbar-item { }
  .hbar-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 4px;
  }
  .hbar-name { color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70%; }
  .hbar-val  { color: var(--accent2); font-weight: 700; }
  .hbar-track {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .hbar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width .6s ease;
  }

  /* ── Origin pills ────────────────────────────────────────── */
  .origin-list { display: flex; flex-direction: column; gap: 8px; }
  .origin-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
  }
  .origin-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .origin-name { flex: 1; color: var(--text); }
  .origin-count { font-weight: 700; color: var(--accent2); }
  .origin-pct { color: var(--muted); width: 36px; text-align: right; }
  .origin-track {
    width: 80px;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .origin-fill { height: 100%; border-radius: 2px; }

  /* ── Funnel ──────────────────────────────────────────────── */
  .funnel { display: flex; flex-direction: column; gap: 6px; }
  .funnel-item {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .funnel-label {
    width: 60px;
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    flex-shrink: 0;
  }
  .funnel-bar-wrap { flex: 1; }
  .funnel-bar {
    height: 28px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    padding-left: 10px;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    transition: width .6s ease;
    min-width: 40px;
  }
  .funnel-count { width: 48px; text-align: right; font-size: 12px; font-weight: 700; color: var(--text); }

  /* ── Loading / empty ─────────────────────────────────────── */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--muted);
    font-size: 13px;
    flex-direction: column;
    gap: 12px;
  }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Responsive ──────────────────────────────────────────── */
  @media (max-width: 900px) {
    .chart-card.col-8,
    .chart-card.col-4,
    .chart-card.col-6 { grid-column: span 12; }
  }

  @media (max-width: 600px) {
    header { padding: 12px 16px; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .kpi-value { font-size: 22px; }
    .filters { flex-direction: column; }
  }
</style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-mark">M</div>
      <div class="logo-text">
        <div class="logo-title">Maestro · Jornada do Comprador</div>
        <div class="logo-sub">Dashboard de Recompra</div>
      </div>
    </div>
    <div id="last-update">Carregando...</div>
  </div>
</header>

<!-- ── MAIN ── -->
<main id="app">
  <div class="loading" id="global-loading">
    <div class="spinner"></div>
    <span>Carregando dados...</span>
  </div>
</main>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════════════════════════
const DATA_URL = "./data/data.json";
const REFRESH_MS = 60 * 60 * 1000; // 1 hora

const ORIGIN_COLORS = {
  "Meta Ads":   "#1877f2",
  "Instagram":  "#e1306c",
  "YouTube":    "#ff0000",
  "E-mail":     "#22d3a5",
  "WhatsApp":   "#25d366",
  "Sem origem": "#64748b",
  "Outros":     "#a78bfa",
};

const FUNNEL_COLORS = ["#6c63ff","#a78bfa","#22d3a5","#fbbf24"];

// ══════════════════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════════════════
let _data = null;
let _charts = {};
let _filters = { dateFrom: "", dateTo: "", product: "", origin: "" };

// ══════════════════════════════════════════════════════════════════════════════
// FETCH
// ══════════════════════════════════════════════════════════════════════════════
async function fetchData() {
  const res = await fetch(DATA_URL + "?t=" + Date.now());
  if (!res.ok) throw new Error("Falha ao carregar dados");
  return res.json();
}

// ══════════════════════════════════════════════════════════════════════════════
// FILTER ENGINE (client-side sobre raw[])
// ══════════════════════════════════════════════════════════════════════════════
function applyFilters(data) {
  if (!data.raw || data.raw.length === 0) return data;

  const { dateFrom, dateTo, product, origin } = _filters;
  const hasFilter = dateFrom || dateTo || product || origin;
  if (!hasFilter) return data;

  // Filtrar raw por compras que passam nos critérios
  const filtered = data.raw.map(buyer => {
    const purchases = buyer.purchases.filter(p => {
      if (dateFrom && p.date < dateFrom) return false;
      if (dateTo   && p.date > dateTo)   return false;
      if (product  && p.product !== product) return false;
      if (origin   && p.origin  !== origin)  return false;
      return true;
    });
    return { ...buyer, purchases, count: purchases.length, ltv: purchases.reduce((s, p) => s + p.revenue, 0) };
  }).filter(b => b.purchases.length > 0);

  // Recalcular KPIs e charts a partir do filtrado
  return recompute(filtered, data);
}

function recompute(filtered, original) {
  const buyers_by_count = {};
  filtered.forEach(b => { buyers_by_count[b.count] = (buyers_by_count[b.count] || 0) + 1; });

  const rebuyers = filtered.filter(b => b.count > 1);
  const days12 = [], days1last = [];

  rebuyers.forEach(b => {
    const dates = b.purchases.map(p => p.date).sort();
    if (dates.length >= 2) {
      days12.push(daysBetween(dates[0], dates[1]));
      days1last.push(daysBetween(dates[0], dates[dates.length - 1]));
    }
  });

  const avg = arr => arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0;

  // rebuy_by_month
  const byMonth = {};
  rebuyers.forEach(b => b.purchases.slice(1).forEach(p => {
    const k = p.date.slice(0,7);
    byMonth[k] = (byMonth[k]||0) + 1;
  }));

  // rebuy_by_origin
  const byOrigin = {};
  rebuyers.forEach(b => b.purchases.slice(1).forEach(p => {
    byOrigin[p.origin] = (byOrigin[p.origin]||0)+1;
  }));

  // rebuy_by_product
  const byProduct = {};
  rebuyers.forEach(b => b.purchases.slice(1).forEach(p => {
    byProduct[p.product] = (byProduct[p.product]||0)+1;
  }));
  const topProduct = Object.entries(byProduct).sort((a,b)=>b[1]-a[1])[0]?.[0] || "—";

  const totalLTV = filtered.reduce((s,b)=>s+b.ltv,0);
  const avgLTV = filtered.length ? totalLTV/filtered.length : 0;

  return {
    ...original,
    kpis: {
      total_buyers:       filtered.length,
      buyers_1x:          buyers_by_count[1] || 0,
      buyers_2x:          buyers_by_count[2] || 0,
      buyers_3x:          buyers_by_count[3] || 0,
      buyers_4x_plus:     Object.entries(buyers_by_count).filter(([k])=>+k>=4).reduce((s,[,v])=>s+v,0),
      total_rebuyers:     rebuyers.length,
      total_repurchases:  rebuyers.reduce((s,b)=>s+b.count-1,0),
      avg_ltv:            Math.round(avgLTV * 100)/100,
      avg_days_1_to_2:    avg(days12),
      avg_days_1_to_last: avg(days1last),
      top_rebuy_product:  topProduct,
    },
    charts: {
      rebuy_by_month:   Object.fromEntries(Object.entries(byMonth).sort()),
      rebuy_by_origin:  byOrigin,
      rebuy_by_product: Object.fromEntries(Object.entries(byProduct).sort((a,b)=>b[1]-a[1])),
      buyers_by_month:  original.charts.buyers_by_month,
    },
  };
}

function daysBetween(a, b) {
  return Math.abs((new Date(b) - new Date(a)) / 86400000);
}

// ══════════════════════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════════════════════
function render(data) {
  const app = document.getElementById("app");
  app.innerHTML = "";

  const d = applyFilters(data);

  renderFilters(app, data);
  renderKPIs(app, d.kpis);
  renderCharts(app, d);
}

// ── Filters ────────────────────────────────────────────────────────────────
function renderFilters(container, data) {
  const products = data.filters?.products || [];
  const origins  = data.filters?.origins  || [];

  const el = document.createElement("div");
  el.className = "filters";
  el.innerHTML = `
    <div class="filter-group">
      <span class="filter-label">De</span>
      <input type="date" id="f-date-from" value="${_filters.dateFrom}">
    </div>
    <div class="filter-group">
      <span class="filter-label">Até</span>
      <input type="date" id="f-date-to" value="${_filters.dateTo}">
    </div>
    <div class="filter-group">
      <span class="filter-label">Produto</span>
      <select id="f-product">
        <option value="">Todos</option>
        ${products.map(p => `<option value="${esc(p)}" ${_filters.product===p?"selected":""}>${esc(p)}</option>`).join("")}
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Origem</span>
      <select id="f-origin">
        <option value="">Todas</option>
        ${origins.map(o => `<option value="${esc(o)}" ${_filters.origin===o?"selected":""}>${esc(o)}</option>`).join("")}
      </select>
    </div>
    <button class="btn-reset" id="btn-reset">↺ Limpar</button>
  `;
  container.appendChild(el);

  const update = () => {
    _filters.dateFrom = document.getElementById("f-date-from").value;
    _filters.dateTo   = document.getElementById("f-date-to").value;
    _filters.product  = document.getElementById("f-product").value;
    _filters.origin   = document.getElementById("f-origin").value;
    render(_data);
  };

  el.querySelectorAll("select, input").forEach(e => e.addEventListener("change", update));
  el.querySelector("#btn-reset").addEventListener("click", () => {
    _filters = { dateFrom:"", dateTo:"", product:"", origin:"" };
    render(_data);
  });
}

// ── KPI Cards ──────────────────────────────────────────────────────────────
function renderKPIs(container, kpis) {
  const section = mk("div");
  section.innerHTML = `<div class="section-title">Visão geral</div>`;

  const grid = mk("div", "kpi-grid");

  const cards = [
    { label:"Compradores únicos",       value: fmt(kpis.total_buyers),       color:"#6c63ff", sub:"Total com ≥1 compra" },
    { label:"Compradores 2×",           value: fmt(kpis.buyers_2x),           color:"#a78bfa", sub:"Exatamente 2 compras" },
    { label:"Compradores 3×",           value: fmt(kpis.buyers_3x),           color:"#22d3a5", sub:"Exatamente 3 compras" },
    { label:"Compradores 4×+",          value: fmt(kpis.buyers_4x_plus),      color:"#fbbf24", sub:"4 ou mais compras" },
    { label:"Total recompradores",      value: fmt(kpis.total_rebuyers),      color:"#6c63ff", sub:"Compraram 2× ou mais" },
    { label:"Total de recompras",       value: fmt(kpis.total_repurchases),   color:"#a78bfa", sub:"Pedidos a partir da 2ª compra" },
    { label:"LTV médio",                value:"R$ "+fmtBRL(kpis.avg_ltv),    color:"#22d3a5", sub:"Por comprador único" },
    { label:"Dias até 2ª compra",       value: kpis.avg_days_1_to_2+"d",     color:"#fbbf24", sub:"Média entre 1ª e 2ª compra" },
    { label:"Dias até última compra",   value: kpis.avg_days_1_to_last+"d",  color:"#f87171", sub:"Média entre 1ª e última" },
    { label:"Produto + recompras",      value:"",                             color:"#6c63ff", sub: kpis.top_rebuy_product, big: false },
  ];

  cards.forEach(c => {
    const card = mk("div", "kpi-card");
    card.style.setProperty("--kpi-color", c.color);
    card.innerHTML = `
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-value" style="font-size:${c.value?"":""}">${c.value || "🏆"}</div>
      <div class="kpi-sub">${c.sub}</div>
    `;
    grid.appendChild(card);
  });

  section.appendChild(grid);
  container.appendChild(section);
}

// ── Charts ─────────────────────────────────────────────────────────────────
function renderCharts(container, d) {
  const grid = mk("div","charts-grid");

  // 1. Recompras por mês (linha) — col-8
  grid.appendChild(chartMonthLine(d.charts.rebuy_by_month));

  // 2. Funil de compradores — col-4
  grid.appendChild(chartFunnel(d.kpis));

  // 3. Recompras por produto — col-6
  grid.appendChild(chartProductBars(d.charts.rebuy_by_product));

  // 4. Recompras por origem — col-6
  grid.appendChild(chartOrigin(d.charts.rebuy_by_origin));

  container.appendChild(grid);

  // Inicializar Chart.js após DOM montado
  requestAnimationFrame(() => initCharts(d));
}

function chartMonthLine(byMonth) {
  const card = mk("div","chart-card col-8");
  card.innerHTML = `
    <div class="chart-title">Recompras por mês</div>
    <div class="chart-sub">Quantidade de recompras (2ª compra em diante) por mês de compra</div>
    <div class="chart-wrap" style="height:220px"><canvas id="chart-month"></canvas></div>
  `;
  return card;
}

function chartFunnel(kpis) {
  const card = mk("div","chart-card col-4");
  const items = [
    { label:"1×", count: kpis.buyers_1x,      pct: 100 },
    { label:"2×", count: kpis.buyers_2x,      pct: kpis.buyers_1x ? Math.round(kpis.buyers_2x/kpis.total_buyers*100) : 0 },
    { label:"3×", count: kpis.buyers_3x,      pct: kpis.buyers_1x ? Math.round(kpis.buyers_3x/kpis.total_buyers*100) : 0 },
    { label:"4×+",count: kpis.buyers_4x_plus, pct: kpis.buyers_1x ? Math.round(kpis.buyers_4x_plus/kpis.total_buyers*100) : 0 },
  ];
  const max = kpis.total_buyers || 1;
  card.innerHTML = `
    <div class="chart-title">Frequência de compra</div>
    <div class="chart-sub">Distribuição por número de compras</div>
    <div class="funnel">
      ${items.map((item,i)=>`
        <div class="funnel-item">
          <div class="funnel-label">${item.label}</div>
          <div class="funnel-bar-wrap">
            <div class="funnel-bar" style="background:${FUNNEL_COLORS[i]};width:${Math.max(item.count/max*100,4)}%">
              ${item.pct}%
            </div>
          </div>
          <div class="funnel-count">${fmt(item.count)}</div>
        </div>
      `).join("")}
    </div>
  `;
  return card;
}

function chartProductBars(byProduct) {
  const card = mk("div","chart-card col-6");
  const entries = Object.entries(byProduct).slice(0,8);
  const max = entries[0]?.[1] || 1;
  card.innerHTML = `
    <div class="chart-title">Recompras por produto</div>
    <div class="chart-sub">Produtos mais escolhidos na 2ª compra em diante</div>
    <div class="hbar-list">
      ${entries.map(([name,val])=>`
        <div class="hbar-item">
          <div class="hbar-meta">
            <span class="hbar-name" title="${esc(name)}">${esc(name)}</span>
            <span class="hbar-val">${fmt(val)}</span>
          </div>
          <div class="hbar-track"><div class="hbar-fill" style="width:${val/max*100}%"></div></div>
        </div>
      `).join("") || '<div style="color:var(--muted);font-size:12px;padding:8px 0">Sem dados</div>'}
    </div>
  `;
  return card;
}

function chartOrigin(byOrigin) {
  const card = mk("div","chart-card col-6");
  const entries = Object.entries(byOrigin).sort((a,b)=>b[1]-a[1]);
  const total = entries.reduce((s,[,v])=>s+v,0) || 1;
  card.innerHTML = `
    <div class="chart-title">Recompras por canal de origem</div>
    <div class="chart-sub">Canal atribuído à recompra (UTM/src)</div>
    <div class="origin-list">
      ${entries.map(([name,val])=>`
        <div class="origin-item">
          <div class="origin-dot" style="background:${ORIGIN_COLORS[name]||"#64748b"}"></div>
          <div class="origin-name">${esc(name)}</div>
          <div class="origin-track">
            <div class="origin-fill" style="width:${val/total*100}%;background:${ORIGIN_COLORS[name]||"#64748b"}"></div>
          </div>
          <div class="origin-count">${fmt(val)}</div>
          <div class="origin-pct">${Math.round(val/total*100)}%</div>
        </div>
      `).join("") || '<div style="color:var(--muted);font-size:12px">Sem dados</div>'}
    </div>
  `;
  return card;
}

// ── Chart.js init ──────────────────────────────────────────────────────────
function initCharts(d) {
  destroyCharts();

  // Linha — recompras por mês
  const monthEl = document.getElementById("chart-month");
  if (monthEl) {
    const labels = Object.keys(d.charts.rebuy_by_month).map(formatMonth);
    const values = Object.values(d.charts.rebuy_by_month);
    _charts.month = new Chart(monthEl, {
      type: "line",
      data: {
        labels,
        datasets: [{
          label: "Recompras",
          data: values,
          borderColor: "#6c63ff",
          backgroundColor: "rgba(108,99,255,.15)",
          fill: true,
          tension: 0.4,
          pointBackgroundColor: "#6c63ff",
          pointRadius: 4,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color:"#64748b", font:{size:11} }, grid:{color:"#1c2030"} },
          y: { ticks: { color:"#64748b", font:{size:11} }, grid:{color:"#1c2030"}, beginAtZero:true },
        }
      }
    });
  }
}

function destroyCharts() {
  Object.values(_charts).forEach(c => { try { c.destroy(); } catch(e){} });
  _charts = {};
}

// ══════════════════════════════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════════════════════════════
function mk(tag, cls="") {
  const el = document.createElement(tag);
  if (cls) el.className = cls;
  return el;
}

function esc(str) {
  return String(str ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function fmt(n) {
  return Number(n ?? 0).toLocaleString("pt-BR");
}

function fmtBRL(n) {
  return Number(n ?? 0).toLocaleString("pt-BR", { minimumFractionDigits:2, maximumFractionDigits:2 });
}

function formatMonth(ym) {
  const [y,m] = ym.split("-");
  const months = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  return `${months[+m-1]}/${y.slice(2)}`;
}

function updateTimestamp(iso) {
  const el = document.getElementById("last-update");
  if (!iso) { el.textContent = "Dados indisponíveis"; return; }
  const d = new Date(iso);
  el.textContent = `Atualizado ${d.toLocaleDateString("pt-BR")} às ${d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})} UTC`;
}

// ══════════════════════════════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════════════════════════════
async function init() {
  try {
    _data = await fetchData();
    updateTimestamp(_data.generated_at);
    document.getElementById("global-loading")?.remove();
    render(_data);
  } catch(e) {
    document.getElementById("app").innerHTML = `
      <div class="loading">
        <span style="color:var(--red)">⚠ Não foi possível carregar os dados.</span>
        <span style="font-size:12px;color:var(--muted)">${e.message}</span>
      </div>`;
  }
}

init();
setInterval(async () => {
  try {
    _data = await fetchData();
    updateTimestamp(_data.generated_at);
    render(_data);
  } catch(e) { console.warn("Refresh falhou:", e); }
}, REFRESH_MS);
</script>
</body>
</html>
