name: Atualizar dados (hourly)

on:
  schedule:
    - cron: "0 * * * *"   # toda hora no minuto 0
  workflow_dispatch:        # permite rodar manualmente pelo GitHub

permissions:
  contents: write           # necessário para commitar o data.json

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar script de dados
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: python scripts/fetch_data.py

      - name: Commitar data.json atualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data.json
          git diff --staged --quiet || git commit -m "chore: atualiza data.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
